version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    groups:
      site-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /vscode-extension
    schedule:
      interval: weekly
    groups:
      vscode-extension-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
