name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o specter_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }} .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: specter_${{ matrix.os }}_${{ matrix.arch }}
          path: specter_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/specter-${{ github.ref_name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate and verify SHA256 checksums
        working-directory: dist
        run: |
          sha256sum specter_* *.spdx.json | sort -k2 > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: dist/SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*

  update-formula:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Compute SHA256 for each binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ github.ref_name }}
          for target in darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
            gh release download "$VERSION" \
              --pattern "specter_${target}" \
              --output "specter_${target}"
            SHA=$(sha256sum "specter_${target}" | cut -d' ' -f1)
            echo "SHA256_${target}=${SHA}" >> "$GITHUB_ENV"
          done

      - name: Update Formula/specter.rb
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}
          sed -i "s/version \".*\"/version \"${VERSION_NUM}\"/" Formula/specter.rb
          ruby -0pi -e '$_.gsub!(/(specter_darwin_amd64"\n\s+sha256 ")[^"]+(")/, "\\1#{ENV.fetch("SHA256_darwin_amd64")}\\2")' Formula/specter.rb
          ruby -0pi -e '$_.gsub!(/(specter_darwin_arm64"\n\s+sha256 ")[^"]+(")/, "\\1#{ENV.fetch("SHA256_darwin_arm64")}\\2")' Formula/specter.rb
          ruby -0pi -e '$_.gsub!(/(specter_linux_amd64"\n\s+sha256 ")[^"]+(")/, "\\1#{ENV.fetch("SHA256_linux_amd64")}\\2")' Formula/specter.rb
          ruby -0pi -e '$_.gsub!(/(specter_linux_arm64"\n\s+sha256 ")[^"]+(")/, "\\1#{ENV.fetch("SHA256_linux_arm64")}\\2")' Formula/specter.rb

      - name: Open formula update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ github.ref_name }}
          BRANCH="chore/update-formula-${VERSION}"

          if git diff --quiet -- Formula/specter.rb; then
            echo "Formula/specter.rb is already up to date for ${VERSION}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add Formula/specter.rb
          git commit -m "chore: update formula to ${VERSION}"
          git push --force-with-lease origin "$BRANCH"

          EXISTING_PR_URL=$(gh pr view "$BRANCH" --json url --jq .url 2>/dev/null || true)
          if [ -n "$EXISTING_PR_URL" ]; then
            echo "Formula update pull request already exists: $EXISTING_PR_URL"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update formula to ${VERSION}" \
            --body "Updates the Homebrew formula version and SHA256 checksums for ${VERSION}."
