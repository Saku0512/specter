cors: true
# proxy: http://api.example.com  # forward unmatched routes to a real API

routes:
  # Basic GET
  - path: /users
    method: GET
    status: 200
    response:
      - id: 1
        name: Alice
      - id: 2
        name: Bob

  # Path parameter embedded in response
  - path: /users/:id
    method: GET
    status: 200
    response:
      id: ":id"   # /users/42 → { id: 42 }
      name: Alice

  # POST with 201
  - path: /users
    method: POST
    status: 201
    response:
      message: created

  # Custom response headers
  - path: /token
    method: POST
    status: 200
    headers:
      X-Auth-Token: dummy-token
    response:
      ok: true

  # Response delay (ms)
  - path: /slow
    method: GET
    delay: 1000
    response:
      message: finally

  # Request body matching
  - path: /login
    method: POST
    match:
      - body:
          role: admin
        status: 200
        response: { token: admin-token }
      - body:
          role: guest
        status: 403
        response: { error: forbidden }
    response: { token: default-token }

  # Query parameter matching
  - path: /search
    method: GET
    match:
      - query:
          q: error
        status: 500
        response: { error: something went wrong }
      - query:
          q: empty
        response: []
    response:
      - id: 1
        name: Alice

  # Sequential responses — fails first, succeeds on retry
  - path: /unstable
    method: GET
    mode: sequential
    responses:
      - status: 500
        response: { error: internal }
      - status: 200
        response: { ok: true }

  # Random responses — simulates flaky network
  - path: /flaky
    method: GET
    mode: random
    responses:
      - status: 200
        response: { ok: true }
      - status: 503
        response: { error: unavailable }
